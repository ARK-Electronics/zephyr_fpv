CONFIG_LOG=y
CONFIG_GPIO=y

# This is a flight-controller demo binary — performance over power. We don't
# enable any of Zephyr's power-management subsystem (it's already off by
# default, asserted here so a future agent doesn't flip it on by reflex).
# CONFIG_PM is not set
# CONFIG_PM_DEVICE is not set

# Cortex-M idle still issues WFI to halt the core between interrupts, which
# is harmless for the application but matters for SWD: the STM32H7 SoC code
# (soc/st/stm32/common/soc_config.c) disables D1 debug across sleep/stop at
# boot by default, which makes the STLink unable to attach to a running image
# without --connect-under-reset. Enabling this Kconfig flips the DBGMCU
# registers the other way, so the debug interface stays live.
CONFIG_STM32_ENABLE_DEBUG_SLEEP_STOP=y
